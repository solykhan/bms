<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</helmet>
<header style="position:sticky;top:0;z-index:50;background:rgba(246,242,234,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(51,70,59,0.12);font-family:'Mulish',sans-serif;">
  <div style="max-width:1160px;margin:0 auto;padding:0 28px;height:76px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="index.html" style="display:flex;flex-direction:column;text-decoration:none;line-height:1;">
      <span style="font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;color:#33463B;letter-spacing:0.5px;">Linda Mani</span>
      <span style="font-size:10.5px;font-weight:600;letter-spacing:2.4px;text-transform:uppercase;color:#B08D57;margin-top:3px;">Wedding &amp; Civil Celebrant</span>
    </a>
    <nav style="display:flex;align-items:center;gap:30px;">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="6">
        <a href="{{ link.href }}" style="{{ link.style }}">{{ link.label }}</a>
      </sc-for>
    </nav>
    <a href="tel:0421768296" style="display:inline-flex;align-items:center;gap:8px;background:#33463B;color:#F6F2EA;text-decoration:none;padding:11px 20px;border-radius:2px;font-size:13.5px;font-weight:600;letter-spacing:0.3px;white-space:nowrap;">0421 768 296</a>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1160,&quot;height&quot;:76},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || "";
    const base = "text-decoration:none;font-size:14px;font-weight:500;letter-spacing:0.2px;padding-bottom:3px;transition:color .2s;";
    const items = [
      { label: "Home", href: "index.html", key: "home" },
      { label: "About", href: "About.dc.html", key: "about" },
      { label: "Services", href: "Services.dc.html", key: "services" },
      { label: "Service Areas", href: "Areas.dc.html", key: "areas" },
      { label: "Blog", href: "Blog.dc.html", key: "blog" },
      { label: "Contact", href: "Contact.dc.html", key: "contact" },
    ];
    const links = items.map((it) => {
      const on = it.key === active;
      return {
        label: it.label,
        href: it.href,
        style: base + (on
          ? "color:#33463B;border-bottom:2px solid #B08D57;"
          : "color:#5C6157;border-bottom:2px solid transparent;"),
      };
    });
    return { links };
  }
}
</script>
</body>
</html>
