name: Daily Auto-Blog
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl
      - name: Generate the next queued post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: php cron/autoblog.php
      - name: Commit & push the new post
        run: |
          git config user.name "bms-autoblog"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No new post this run."
          else
            git commit -m "Auto-publish blog post ($(date +%F))"
            git push origin HEAD:main
          fi
